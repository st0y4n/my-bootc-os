---
# yaml-language-server: $schema=https://schema.blue-build.org/recipe-v1.json

name: cinnamon
base-image: ghcr.io/blue-build/base-images/fedora-base
image-version: latest
description: Cinnamon

modules:
  - from-file: recipe.yml
  - from-file: cinnamon.yml
  - type: custom-kernel
    source: local
    kernel: stock
    secrets:
      - type: file
        source: .secure_files/MOK.priv
        mount:
          type: file
          destination: /tmp/certs/MOK.priv
    sign:
      key: /tmp/certs/MOK.priv
      cert: /usr/share/cert/MOK.pem
      mok-password: stoyan
  - from-file: finalize.yml
