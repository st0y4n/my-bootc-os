name:
base-image:
image-version:
description:

modules:
  - from-file: recipe.yml
  - type: custom-kernel
    source: local
    kernel: stock
    secrets:
      - type: file
        source: .secure_files/MOK.priv
        mount:
          type: file
          destination: /tmp/certs/MOK.priv
    sign:
      key: /tmp/certs/MOK.priv
      cert: /usr/share/cert/MOK.pem
      mok-password: stoyan
  - from-file: finalize.yml
