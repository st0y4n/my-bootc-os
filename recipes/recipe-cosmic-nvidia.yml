---
# yaml-language-server: $schema=https://schema.blue-build.org/recipe-v1.json

name: cosmic-nvidia
base-image: ghcr.io/ublue-os/cosmic-atomic-main
image-version: latest
description: cosmic nvidia

modules:
  - from-file: recipe.yml
  - type: custom-kernel
    source: local
    kernel: stock
    nvidia: true
    secrets:
      - type: file
        source: .secure_files/MOK.priv
        mount:
          type: file
          destination: /tmp/certs/MOK.priv
    sign:
      key: /tmp/certs/MOK.priv
      cert: /usr/share/cert/MOK.pem
      mok-password: stoyan
  - from-file: finalize.yml